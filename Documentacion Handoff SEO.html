document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 optimización: el tráfico ya existía y estaba a un paso del top 3.<\u002Fp>\n        <table class=\"data\">\n          <thead><tr><th>Métrica (28 días)<\u002Fth><th class=\"r\">Valor<\u002Fth><th>Lectura<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>Clics<\u002Ftd><td class=\"r\">18.200<\u002Ftd><td>Volumen alto ya consolidado<\u002Ftd><\u002Ftr>\n            <tr><td>Impresiones<\u002Ftd><td class=\"r\">239.000<\u002Ftd><td>Demanda de búsqueda fuerte<\u002Ftd><\u002Ftr>\n            <tr><td>CTR promedio<\u002Ftd><td class=\"r\">7,6%<\u002Ftd><td>Mejorable vía title/meta<\u002Ftd><\u002Ftr>\n            <tr><td>Posición media<\u002Ftd><td class=\"r\">4<\u002Ftd><td>A un paso del top 3<\u002Ftd><\u002Ftr>\n            <tr><td>Tráfico orgánico<\u002Ftd><td class=\"r\">79%<\u002Ftd><td>Canal principal del sitio<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <div class=\"callout\"><p><strong>Tesis de la optimización:<\u002Fstrong> con el tráfico ya consolidado en posición 4, la palanca de crecimiento está en (1) aumentar el CTR del resultado en el SERP y (2) reforzar la autoridad temática con contenido indexable, para empujar al top 3 y capturar featured snippets.<\u002Fp><\u002Fdiv>\n        <h3>Gaps detectados en el diagnóstico<\u002Fh3>\n        <p>Title y meta description mejorables (sin año/variantes ni optimización de CTR); H2 que no capturaban ninguna query real; contenido indexable escaso (solo H1 + intro + FAQ); ausencia de schema <code class=\"inl\">SoftwareApplication<\u002Fcode>; e interlinking interno limitado a 2 calculadoras. Ya estaban correctos el H1 y el schema <code class=\"inl\">FAQPage<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- ===== 2 · RESUMEN DE LO AGREGADO ===== -->\n      <div class=\"sec\">\n        <div class=\"eyebrow\">02 · Resumen<\u002Fdiv>\n        <h2>Qué se agregó en el rediseño del front<\u002Fh2>\n        <p>Estos elementos ya están implementados en el diseño entregado. Esta documentación los formaliza para que desarrollo los lleve a producción.<\u002Fp>\n        <ul>\n          <li><strong>5 H2 orientados a keywords<\u002Fstrong> que capturan queries reales de búsqueda.<\u002Fli>\n          <li><strong>Contenido indexable profundo:<\u002Fstrong> tabla comparativa de 7 AFP, ejemplo numérico resuelto y tabla de tramos del impuesto único 2026.<\u002Fli>\n          <li><strong>Columna lateral<\u002Fstrong> con índice ancla de navegación interna y módulo de sueldo mínimo.<\u002Fli>\n          <li><strong>Interlinking<\u002Fstrong> hacia blog y otras calculadoras.<\u002Fli>\n          <li><strong>FAQ<\u002Fstrong> de 8 preguntas y sello de actualización \"Junio 2026\" con valores UF/UTM fechados.<\u002Fli>\n          <li><strong>Identidad visual Buk<\u002Fstrong> (azul #2F4DAA, logo oficial) y <strong>diseño responsivo<\u002Fstrong> mobile-first.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- ===== 3 · META TAGS ===== -->\n      <div class=\"sec\">\n        <div class=\"eyebrow\">03 · Metadatos<\u002Fdiv>\n        <h2>Title tag y meta description <span class=\"pill p-alta\">Prioridad alta<\u002Fspan><\u002Fh2>\n        <p>Impacto directo en el CTR del resultado en Google. Reemplazar los valores actuales por los siguientes.<\u002Fp>\n        <div class=\"field\"><div class=\"lbl\">Title tag · ≤ 60 caracteres<\u002Fdiv><div class=\"val\">Calculadora Sueldo Líquido Chile 2026 | Gratis | Buk<\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><div class=\"lbl\">Meta description · ≤ 155 caracteres<\u002Fdiv><div class=\"val\">¿Cuánto recibirás en el bolsillo? Calcula gratis el sueldo líquido en Chile 2026 con AFP, salud e impuestos. Resultado al instante con la calculadora de Buk.<\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><div class=\"lbl\">Canonical<\u002Fdiv><div class=\"val\">&lt;link rel=\"canonical\" href=\"https://www.buk.cl/recursos/calculadora/calculadora-sueldo-liquido\"&gt;<\u002Fdiv><\u002Fdiv>\n        <h3>Open Graph / Twitter Cards<\u002Fh3>\n<pre><span class=\"c\">&lt;!-- Open Graph --&gt;<\u002Fspan>\n&lt;meta property=<span class=\"s\">\"og:title\"<\u002Fspan> content=<span class=\"s\">\"Calculadora Sueldo Líquido Chile 2026 | Buk\"<\u002Fspan>&gt;\n&lt;meta property=<span class=\"s\">\"og:description\"<\u002Fspan> content=<span class=\"s\">\"Calcula gratis tu sueldo líquido en Chile 2026 con AFP, salud e impuestos.\"<\u002Fspan>&gt;\n&lt;meta property=<span class=\"s\">\"og:type\"<\u002Fspan> content=<span class=\"s\">\"website\"<\u002Fspan>&gt;\n&lt;meta property=<span class=\"s\">\"og:url\"<\u002Fspan> content=<span class=\"s\">\"https://www.buk.cl/recursos/calculadora/calculadora-sueldo-liquido\"<\u002Fspan>&gt;\n&lt;meta property=<span class=\"s\">\"og:image\"<\u002Fspan> content=<span class=\"s\">\"https://www.buk.cl/og/calculadora-sueldo-liquido.png\"<\u002Fspan>&gt;\n&lt;meta name=<span class=\"s\">\"twitter:card\"<\u002Fspan> content=<span class=\"s\">\"summary_large_image\"<\u002Fspan>&gt;<\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- ===== 4 · SCHEMA MARKUP ===== -->\n      <div class=\"sec\">\n        <div class=\"eyebrow\">04 · Datos estructurados<\u002Fdiv>\n        <h2>Schema markup (JSON-LD) <span class=\"pill p-alta\">Prioridad alta<\u002Fspan><\u002Fh2>\n        <p>Insertar en el <code class=\"inl\">&lt;head&gt;<\u002Fcode> o antes de <code class=\"inl\">&lt;/body&gt;<\u002Fcode>. Habilita rich results y que Google reconozca la página como herramienta interactiva. Validar con el <strong>Rich Results Test<\u002Fstrong> de Google.<\u002Fp>\n        <h3>A · SoftwareApplication (calculadora)<\u002Fh3>\n<pre>&lt;script type=<span class=\"s\">\"application/ld+json\"<\u002Fspan>&gt;\n{\n  <span class=\"k\">\"@context\"<\u002Fspan>: <span class=\"s\">\"https://schema.org\"<\u002Fspan>,\n  <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"WebApplication\"<\u002Fspan>,\n  <span class=\"k\">\"name\"<\u002Fspan>: <span class=\"s\">\"Calculadora de Sueldo Líquido\"<\u002Fspan>,\n  <span class=\"k\">\"applicationCategory\"<\u002Fspan>: <span class=\"s\">\"FinanceApplication\"<\u002Fspan>,\n  <span class=\"k\">\"operatingSystem\"<\u002Fspan>: <span class=\"s\">\"Web\"<\u002Fspan>,\n  <span class=\"k\">\"url\"<\u002Fspan>: <span class=\"s\">\"https://www.buk.cl/recursos/calculadora/calculadora-sueldo-liquido\"<\u002Fspan>,\n  <span class=\"k\">\"description\"<\u002Fspan>: <span class=\"s\">\"Calcula el sueldo líquido en Chile considerando AFP, salud, seguro de cesantía e impuesto único.\"<\u002Fspan>,\n  <span class=\"k\">\"inLanguage\"<\u002Fspan>: <span class=\"s\">\"es-CL\"<\u002Fspan>,\n  <span class=\"k\">\"offers\"<\u002Fspan>: {\n    <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"Offer\"<\u002Fspan>,\n    <span class=\"k\">\"price\"<\u002Fspan>: <span class=\"s\">\"0\"<\u002Fspan>,\n    <span class=\"k\">\"priceCurrency\"<\u002Fspan>: <span class=\"s\">\"CLP\"<\u002Fspan>\n  },\n  <span class=\"k\">\"publisher\"<\u002Fspan>: {\n    <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"Organization\"<\u002Fspan>,\n    <span class=\"k\">\"name\"<\u002Fspan>: <span class=\"s\">\"Buk\"<\u002Fspan>,\n    <span class=\"k\">\"logo\"<\u002Fspan>: <span class=\"s\">\"https://www.buk.cl/logo-buk.svg\"<\u002Fspan>\n  }\n}\n&lt;/script&gt;<\u002Fpre>\n        <h3>B · BreadcrumbList (migaja)<\u002Fh3>\n<pre>&lt;script type=<span class=\"s\">\"application/ld+json\"<\u002Fspan>&gt;\n{\n  <span class=\"k\">\"@context\"<\u002Fspan>: <span class=\"s\">\"https://schema.org\"<\u002Fspan>,\n  <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"BreadcrumbList\"<\u002Fspan>,\n  <span class=\"k\">\"itemListElement\"<\u002Fspan>: [\n    { <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"ListItem\"<\u002Fspan>, <span class=\"k\">\"position\"<\u002Fspan>: 1, <span class=\"k\">\"name\"<\u002Fspan>: <span class=\"s\">\"Inicio\"<\u002Fspan>, <span class=\"k\">\"item\"<\u002Fspan>: <span class=\"s\">\"https://www.buk.cl/\"<\u002Fspan> },\n    { <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"ListItem\"<\u002Fspan>, <span class=\"k\">\"position\"<\u002Fspan>: 2, <span class=\"k\">\"name\"<\u002Fspan>: <span class=\"s\">\"Recursos\"<\u002Fspan>, <span class=\"k\">\"item\"<\u002Fspan>: <span class=\"s\">\"https://www.buk.cl/recursos\"<\u002Fspan> },\n    { <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"ListItem\"<\u002Fspan>, <span class=\"k\">\"position\"<\u002Fspan>: 3, <span class=\"k\">\"name\"<\u002Fspan>: <span class=\"s\">\"Calculadora de Sueldo Líquido\"<\u002Fspan> }\n  ]\n}\n&lt;/script&gt;<\u002Fpre>\n        <h3>C · FAQPage (ya existe — mantener sincronizado)<\u002Fh3>\n<pre>&lt;script type=<span class=\"s\">\"application/ld+json\"<\u002Fspan>&gt;\n{\n  <span class=\"k\">\"@context\"<\u002Fspan>: <span class=\"s\">\"https://schema.org\"<\u002Fspan>,\n  <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"FAQPage\"<\u002Fspan>,\n  <span class=\"k\">\"mainEntity\"<\u002Fspan>: [\n    {\n      <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"Question\"<\u002Fspan>,\n      <span class=\"k\">\"name\"<\u002Fspan>: <span class=\"s\">\"¿Cuál es la diferencia entre sueldo bruto y sueldo líquido?\"<\u002Fspan>,\n      <span class=\"k\">\"acceptedAnswer\"<\u002Fspan>: { <span class=\"k\">\"@type\"<\u002Fspan>: <span class=\"s\">\"Answer\"<\u002Fspan>, <span class=\"k\">\"text\"<\u002Fspan>: <span class=\"s\">\"El sueldo bruto es el monto total acordado antes de descuentos; el líquido es lo que se recibe tras descontar AFP, salud, cesantía e impuestos.\"<\u002Fspan> }\n    }\n    <span class=\"c\">/* … repetir un bloque Question por cada una de las 8 preguntas del FAQ … */<\u002Fspan>\n  ]\n}\n&lt;/script&gt;<\u002Fpre>\n        <div class=\"callout\"><p><strong>Importante:<\u002Fstrong> el contenido de cada <code class=\"inl\">Question<\u002Fcode> del schema debe coincidir textualmente con el FAQ visible en la página. Las 8 preguntas están en la sección 5.6 de este documento.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== 5 · CONTENIDO NUEVO ===== -->\n      <div class=\"sec\">\n        <div class=\"eyebrow\">05 · Contenido<\u002Fdiv>\n        <h2>Textos del contenido nuevo<\u002Fh2>\n        <p>Todos los textos a publicar, listos para integrar. Deben estar en el <strong>HTML inicial<\u002Fstrong> (server-side / pre-render), no inyectados solo por JS, para que Google los indexe.<\u002Fp>\n\n        <h3>5.0 · H1 y microtexto del hero<\u002Fh3>\n        <div class=\"field\"><div class=\"lbl\">H1 (único en la página)<\u002Fdiv><div class=\"val\">Calculadora Sueldo Líquido<\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><div class=\"lbl\">Intro hero<\u002Fdiv><div class=\"val\">Ingresa el sueldo base, las gratificaciones, comisiones, bonos, AFP e Isapre y la información que necesites para calcular el sueldo líquido, el cual será el que recibirás tú o tus colaboradores en el bolsillo.<\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><div class=\"lbl\">H2 del bloque calculadora<\u002Fdiv><div class=\"val\">Calcula el sueldo líquido de tus colaboradores<\u002Fdiv><\u002Fdiv>\n\n        <h3>5.1 · H2 — Sueldo mínimo <code class=\"inl\">#s-minimo<\u002Fcode><\u002Fh3>\n        <div class=\"field\"><div class=\"lbl\">H2<\u002Fdiv><div class=\"val\">¿Cuánto es el sueldo mínimo en Chile 2026?<\u002Fdiv><\u002Fdiv>\n        <p>El sueldo mínimo o ingreso mínimo mensual en Chile para 2026 es de <strong>$553.553<\u002Fstrong> para trabajadores entre 18 y 65 años. Este valor es el piso legal sobre el cual se calculan las remuneraciones y sirve de base para estimar el sueldo líquido. Conocer el sueldo mínimo vigente permite verificar que el sueldo base cumpla con la normativa laboral antes de aplicar descuentos.<\u002Fp>\n        <p style=\"font-size:13px !important;color:#9aa0bb !important;\">Microdatos: Ingreso mínimo mensual <strong>$553.553<\u002Fstrong> · Menores de 18 y mayores de 65 <strong>$413.011<\u002Fstrong>.<\u002Fp>\n\n        <h3>5.2 · H2 — Cálculo paso a paso <code class=\"inl\">#s-paso<\u002Fcode><\u002Fh3>\n        <div class=\"field\"><div class=\"lbl\">H2<\u002Fdiv><div class=\"val\">¿Cómo calcular el sueldo líquido de un trabajador paso a paso?<\u002Fdiv><\u002Fdiv>\n        <p>Intro: El sueldo líquido es el monto que el trabajador recibe después de aplicar los descuentos legales sobre su sueldo bruto. Como empleador, debes seguir estos pasos para calcularlo correctamente en la liquidación de sueldo:<\u002Fp>\n        <ol>\n          <li><strong>Determina el sueldo bruto imponible:<\u002Fstrong> sueldo base más haberes imponibles (horas extra, comisiones, bonos, gratificación).<\u002Fli>\n          <li><strong>Descuenta la cotización de AFP:<\u002Fstrong> entre 11,44% y 13,53% según la administradora.<\u002Fli>\n          <li><strong>Descuenta la cotización de salud:<\u002Fstrong> 7% en Fonasa o el valor pactado con la Isapre.<\u002Fli>\n          <li><strong>Aplica el seguro de cesantía:<\u002Fstrong> 0,6% del trabajador y 2,4% del empleador.<\u002Fli>\n          <li><strong>Calcula el impuesto único de segunda categoría<\u002Fstrong> si el sueldo supera el tramo afecto.<\u002Fli>\n          <li><strong>Suma los haberes no imponibles<\u002Fstrong> (colación, movilización) para obtener el sueldo líquido final.<\u002Fli>\n        <\u002Fol>\n\n        <h3>5.3 · H2 — Ejemplo resuelto <code class=\"inl\">#s-ejemplo<\u002Fcode><\u002Fh3>\n        <div class=\"field\"><div class=\"lbl\">H2<\u002Fdiv><div class=\"val\">Ejemplo de cálculo de sueldo líquido en Chile<\u002Fdiv><\u002Fdiv>\n        <p>Intro: Caso práctico de un trabajador con sueldo base de $800.000, afiliado a AFP Modelo, salud en Fonasa (7%) y gratificación legal.<\u002Fp>\n        <table class=\"data\">\n          <thead><tr><th>Concepto<\u002Fth><th class=\"r\">Monto<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>Sueldo base<\u002Ftd><td class=\"r\">$800.000<\u002Ftd><\u002Ftr>\n            <tr><td>Gratificación legal (25% tope)<\u002Ftd><td class=\"r\">+ $200.000<\u002Ftd><\u002Ftr>\n            <tr><td><strong>Total imponible<\u002Fstrong><\u002Ftd><td class=\"r\"><strong>$1.000.000<\u002Fstrong><\u002Ftd><\u002Ftr>\n            <tr><td>AFP Modelo (10,58%)<\u002Ftd><td class=\"r\">− $105.800<\u002Ftd><\u002Ftr>\n            <tr><td>Salud Fonasa (7%)<\u002Ftd><td class=\"r\">− $70.000<\u002Ftd><\u002Ftr>\n            <tr><td>Seguro de cesantía (0,6%)<\u002Ftd><td class=\"r\">− $6.000<\u002Ftd><\u002Ftr>\n            <tr><td>Impuesto único de 2ª categoría<\u002Ftd><td class=\"r\">− $9.135<\u002Ftd><\u002Ftr>\n            <tr><td><strong>Sueldo líquido aproximado<\u002Fstrong><\u002Ftd><td class=\"r\"><strong>$809.065<\u002Fstrong><\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"font-size:13px !important;color:#9aa0bb !important;\">Nota al pie publicada: \"Cifras referenciales calculadas con los valores vigentes a junio de 2026. Usa la calculadora superior para simular tu propio caso.\"<\u002Fp>\n\n        <h3>5.4 · H2 — Descuento AFP <code class=\"inl\">#s-afp<\u002Fcode><\u002Fh3>\n        <div class=\"field\"><div class=\"lbl\">H2<\u002Fdiv><div class=\"val\">¿Cuánto descuenta la AFP del sueldo de tus empleados?<\u002Fdiv><\u002Fdiv>\n        <p>El descuento por AFP varía según la administradora en la que esté afiliado cada trabajador. En 2026 el rango va de <strong>11,44% a 13,53%<\u002Fstrong> del sueldo bruto imponible, monto que incluye el 10% de cotización obligatoria más la comisión de la administradora.<\u002Fp>\n        <table class=\"data\">\n          <thead><tr><th>AFP<\u002Fth><th class=\"r\">Cotización obligatoria<\u002Fth><th class=\"r\">Comisión<\u002Fth><th class=\"r\">Descuento total<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>Uno<\u002Ftd><td class=\"r\">10,00%<\u002Ftd><td class=\"r\">0,49%<\u002Ftd><td class=\"r\">10,49%<\u002Ftd><\u002Ftr>\n            <tr><td>Modelo<\u002Ftd><td class=\"r\">10,00%<\u002Ftd><td class=\"r\">0,58%<\u002Ftd><td class=\"r\">10,58%<\u002Ftd><\u002Ftr>\n            <tr><td>PlanVital<\u002Ftd><td class=\"r\">10,00%<\u002Ftd><td class=\"r\">1,16%<\u002Ftd><td class=\"r\">11,16%<\u002Ftd><\u002Ftr>\n            <tr><td>Habitat<\u002Ftd><td class=\"r\">10,00%<\u002Ftd><td class=\"r\">1,27%<\u002Ftd><td class=\"r\">11,27%<\u002Ftd><\u002Ftr>\n            <tr><td>Capital<\u002Ftd><td class=\"r\">10,00%<\u002Ftd><td class=\"r\">1,44%<\u002Ftd><td class=\"r\">11,44%<\u002Ftd><\u002Ftr>\n            <tr><td>Cuprum<\u002Ftd><td class=\"r\">10,00%<\u002Ftd><td class=\"r\">1,44%<\u002Ftd><td class=\"r\">11,44%<\u002Ftd><\u002Ftr>\n            <tr><td>ProVida<\u002Ftd><td class=\"r\">10,00%<\u002Ftd><td class=\"r\">1,45%<\u002Ftd><td class=\"r\">11,45%<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"font-size:13px !important;color:#9aa0bb !important;\">Nota al pie publicada: \"Comisiones referenciales vigentes a junio de 2026. No incluye el 7% de salud ni el seguro de cesantía. Consulta el valor actualizado en la Superintendencia de Pensiones.\"<\u002Fp>\n\n        <h3>5.5 · H2 — Tramos de impuesto <code class=\"inl\">#s-tramos<\u002Fcode><\u002Fh3>\n        <div class=\"field\"><div class=\"lbl\">H2<\u002Fdiv><div class=\"val\">Tramos del impuesto único de segunda categoría 2026<\u002Fdiv><\u002Fdiv>\n        <p>Intro: El impuesto único se aplica de forma progresiva sobre la renta líquida imponible, expresada en UTM. Los sueldos bajo 13,5 UTM están exentos.<\u002Fp>\n        <table class=\"data\">\n          <thead><tr><th>Renta imponible (UTM)<\u002Fth><th class=\"r\">Factor<\u002Fth><th class=\"r\">Rebaja (UTM)<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>0 — 13,5<\u002Ftd><td class=\"r\">Exento<\u002Ftd><td class=\"r\">—<\u002Ftd><\u002Ftr>\n            <tr><td>13,5 — 30<\u002Ftd><td class=\"r\">4%<\u002Ftd><td class=\"r\">0,54<\u002Ftd><\u002Ftr>\n            <tr><td>30 — 50<\u002Ftd><td class=\"r\">8%<\u002Ftd><td class=\"r\">1,74<\u002Ftd><\u002Ftr>\n            <tr><td>50 — 70<\u002Ftd><td class=\"r\">13,5%<\u002Ftd><td class=\"r\">4,49<\u002Ftd><\u002Ftr>\n            <tr><td>70 — 90<\u002Ftd><td class=\"r\">23%<\u002Ftd><td class=\"r\">11,14<\u002Ftd><\u002Ftr>\n            <tr><td>90 — 120<\u002Ftd><td class=\"r\">30,4%<\u002Ftd><td class=\"r\">17,80<\u002Ftd><\u002Ftr>\n            <tr><td>120 — 310<\u002Ftd><td class=\"r\">35%<\u002Ftd><td class=\"r\">23,92<\u002Ftd><\u002Ftr>\n            <tr><td>310 y más<\u002Ftd><td class=\"r\">40%<\u002Ftd><td class=\"r\">39,42<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"font-size:13px !important;color:#9aa0bb !important;\">Nota al pie publicada: \"Tramos referenciales. Valor UTM junio 2026: $71.508. Revisa los valores oficiales en el Servicio de Impuestos Internos (SII).\"<\u002Fp>\n\n        <h3>5.6 · H2 — Bruto vs. líquido + FAQ <code class=\"inl\">#s-dif<\u002Fcode><\u002Fh3>\n        <div class=\"field\"><div class=\"lbl\">H2<\u002Fdiv><div class=\"val\">Diferencia entre sueldo bruto y sueldo líquido en la liquidación<\u002Fdiv><\u002Fdiv>\n        <p>El sueldo bruto es el monto pactado en el contrato antes de descuentos. El sueldo líquido es lo que el trabajador recibe en su cuenta bancaria. La diferencia, entre un 20% y un 25% en promedio, corresponde a las cotizaciones e impuestos que el empleador debe retener y enterar cada mes.<\u002Fp>\n        <p><strong>Preguntas frecuentes (8) — sincronizar con el schema FAQPage:<\u002Fstrong><\u002Fp>\n        <ol>\n          <li>¿Cuál es la diferencia entre sueldo bruto y sueldo líquido?<\u002Fli>\n          <li>¿Qué descuentos obligatorios se aplican al sueldo bruto?<\u002Fli>\n          <li>¿La gratificación se incluye en el sueldo líquido?<\u002Fli>\n          <li>¿Qué pasa si tengo plan de salud en una Isapre?<\u002Fli>\n          <li>¿Cómo afecta el tipo de AFP al cálculo del sueldo líquido?<\u002Fli>\n          <li>¿Se pueden agregar bonos o comisiones al cálculo?<\u002Fli>\n          <li>¿La calculadora sirve para trabajadores con jornada parcial?<\u002Fli>\n          <li>¿Esta herramienta reemplaza el cálculo oficial de liquidaciones?<\u002Fli>\n        <\u002Fol>\n\n        <h3>5.7 · Índice lateral \"En esta página\"<\u002Fh3>\n        <p>Navegación interna con anclas. Orden y destinos:<\u002Fp>\n        <table class=\"data\">\n          <thead><tr><th>#<\u002Fth><th>Etiqueta<\u002Fth><th>Ancla<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>01<\u002Ftd><td>Calcula el sueldo líquido de tus colaboradores<\u002Ftd><td><code class=\"inl\">#calculadora<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>02<\u002Ftd><td>¿Cuánto es el sueldo mínimo en Chile 2026?<\u002Ftd><td><code class=\"inl\">#s-minimo<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>03<\u002Ftd><td>¿Cómo calcular el sueldo líquido paso a paso?<\u002Ftd><td><code class=\"inl\">#s-paso<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>04<\u002Ftd><td>Ejemplo de cálculo de sueldo líquido<\u002Ftd><td><code class=\"inl\">#s-ejemplo<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>05<\u002Ftd><td>¿Cuánto descuenta la AFP del sueldo?<\u002Ftd><td><code class=\"inl\">#s-afp<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>06<\u002Ftd><td>Tramos del impuesto único 2026<\u002Ftd><td><code class=\"inl\">#s-tramos<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>07<\u002Ftd><td>Diferencia entre sueldo bruto y líquido<\u002Ftd><td><code class=\"inl\">#s-dif<\u002Fcode><\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n      <!-- ===== 6 · TÉCNICO ===== -->\n      <div class=\"sec\">\n        <div class=\"eyebrow\">06 · Técnico<\u002Fdiv>\n        <h2>Requisitos técnicos para front<\u002Fh2>\n\n        <h3>Core Web Vitals <span class=\"pill p-media\">Prioridad media<\u002Fspan><\u002Fh3>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span><strong>LCP:<\u002Fstrong> preload de la fuente Mulish y de la imagen/ilustración principal del hero.<\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span><strong>CLS:<\u002Fstrong> reservar el espacio del bloque de resultado para evitar layout shift al calcular.<\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span><strong>Lazy-load:<\u002Fstrong> <code class=\"inl\">loading=\"lazy\"<\u002Fcode> en imágenes de blog y otras calculadoras (below the fold).<\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Validar en verde móvil con PageSpeed Insights / Lighthouse.<\u002Fspan><\u002Fdiv>\n\n        <h3>Indexación y rendering <span class=\"pill p-media\">Prioridad media<\u002Fspan><\u002Fh3>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>URL limpia: <code class=\"inl\">/recursos/calculadora/calculadora-sueldo-liquido<\u002Fcode> (sin parámetros).<\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Incluir la URL en <code class=\"inl\">sitemap.xml<\u002Fcode> y verificar en Search Console.<\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Contenido indexable (H2, tablas, FAQ) servido en el HTML inicial, no solo inyectado por JS.<\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Un único <code class=\"inl\">&lt;h1&gt;<\u002Fcode> y los <code class=\"inl\">&lt;h2&gt;<\u002Fcode> en orden, sin saltar niveles.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== 7 · CHECKLIST FINAL ===== -->\n      <div class=\"sec\">\n        <div class=\"eyebrow\">07 · Cierre<\u002Fdiv>\n        <h2>Checklist de implementación<\u002Fh2>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Title y meta description actualizados <span class=\"pill p-alta\">alta<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Canonical + Open Graph / Twitter Cards <span class=\"pill p-alta\">alta<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Schema SoftwareApplication + BreadcrumbList <span class=\"pill p-alta\">alta<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>FAQPage sincronizado con las 8 preguntas visibles <span class=\"pill p-ok\">existe<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Contenido nuevo publicado en HTML inicial <span class=\"pill p-alta\">alta<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>Core Web Vitals en verde móvil <span class=\"pill p-media\">media<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"chk\"><span class=\"bx\"><\u002Fspan><span>URL limpia + sitemap + Search Console <span class=\"pill p-media\">media<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <p style=\"margin-top:22px;font-size:13px !important;color:#9aa0bb !important;\">Fuera de front (SEO/contenidos): enlaces internos desde el blog con anchor text variado; mantener actualizados los valores fechados (sueldo mínimo, UF, UTM, comisiones AFP, tramos) cuando cambien.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <\u002Ftd><\u002Ftr><\u002Ftbody>\n    <tfoot><tr><td class=\"ftr-space\"><\u002Ftd><\u002Ftr><\u002Ftfoot>\n  <\u002Ftable>\n<\u002Fmain>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
